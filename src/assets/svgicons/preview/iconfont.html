<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Іконковий шрифт</title>
	<style>
		html,body{
			height: 100%;
		}
		body{
			padding: 1.875rem;
			font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
			font-size: 1em;
			background-color:#333;
			color:#fff;
		}
		.iconfont-page h1{
			font-size: 1.875rem;
			margin-bottom: 2rem;
		}
		.iconfont-page ul{
			display: flex;
			flex-wrap: wrap;
			gap: 2.5rem;
			margin: 0;
			padding: 0;
		}
		.iconfont-page ul li{
			margin-bottom: 0.625rem;
			display: inline-flex;
			gap: 0.625rem;
			list-style: none;
			align-items: center;
		}
		.iconfont-page ul li::before{
			font-size: 2rem;
		}
		@font-face { 
	font-family: "iconfont"; 
	font-display: swap;
	src: url("D://websites/felgilab-new/src/assets/svgicons/preview/iconfont.woff2?def6306616bfe30f3513e4385ee94afb") format("woff2"); 
} 
[class*="--icon-"]::before{
	font-family: iconfont; 
}
	[class*="--icon-ico-triangle"]::before { 
		content: "\f101"; 
	} 
	[class*="--icon-ico-timer"]::before { 
		content: "\f102"; 
	} 
	[class*="--icon-ico-phone24"]::before { 
		content: "\f103"; 
	} 
	[class*="--icon-ico-mail"]::before { 
		content: "\f104"; 
	} 
	[class*="--icon-ico-comment"]::before { 
		content: "\f105"; 
	} 
	[class*="--icon-ico-callback"]::before { 
		content: "\f106"; 
	} 
	[class*="--icon-decor-line-right-accent"]::before { 
		content: "\f107"; 
	} 
	[class*="--icon-decor-double-line-white"]::before { 
		content: "\f108"; 
	} 

	</style>
</head>
<body>
	<div class="iconfont-page">
		<h1>Перелік іконок та їх класів:</h1>
		<ul>
				<li class="--icon-ico-triangle">--icon-ico-triangle</li>
				<li class="--icon-ico-timer">--icon-ico-timer</li>
				<li class="--icon-ico-phone24">--icon-ico-phone24</li>
				<li class="--icon-ico-mail">--icon-ico-mail</li>
				<li class="--icon-ico-comment">--icon-ico-comment</li>
				<li class="--icon-ico-callback">--icon-ico-callback</li>
				<li class="--icon-decor-line-right-accent">--icon-decor-line-right-accent</li>
				<li class="--icon-decor-double-line-white">--icon-decor-double-line-white</li>
		</ul>
	</div>
</body>
</html>
